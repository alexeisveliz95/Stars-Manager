name: 🚀 Daily Momentum Post
on:
  schedule:
    - cron: '0 10 * * 1-4'
  workflow_dispatch: # Permite ejecutarlo manualmente

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Content
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python src/agents/writer_agent.py "single"

      - name: Post to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          if [ -f tweet_single.txt ]; then
            python src/social/twitter_bot.py "tweet_single.txt"
          fi

      - name: Upload Tweet Artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-tweet
          path: tweet_single.txt

      - name: Save History
        run: |
          # 1. Buscamos el archivo específico de este modo
          if [ -f tweet_single.txt ]; then
            # 2. Pasamos el mismo nombre al bot de Twitter
            python src/social/twitter_bot.py "tweet_single.txt"
          else
            echo "❌ Error: tweet_single.txt no fue encontrado en la raíz."
            exit 1
          fi
          
      - name: Debug - List Files
        run: ls -R