name: 🧵 Weekly Deep Dive Thread
on:
  schedule:
    - cron: '0 15 * * 2'
  workflow_dispatch:

jobs:
  thread:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Thread
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python src/agents/writer_agent_2.py "thread"

      - name: Post to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          if [ -f tweet_thread.txt ]; then
            python src/social/twitter_bot.py "tweet_thread.txt"
          fi

      - name: Upload Tweet Artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-tweet
          path: tweet_thread.txt

      - name: Save History
        run: |
          git config --local user.email "agent@github.com"
          git config --local user.name "AI Social Agent"
          
          # Añadimos todos los cambios en la carpeta data (o donde guardes el historial)
          git add data/*.json || echo "No hay cambios en el historial"
          
          # Solo hacemos commit si hay algo en el 'staging area'
          if ! git diff --cached --quiet; then
            git commit -m "Update tweet history [skip ci]"
            git push
          else
            echo "Nada que actualizar hoy."
          fi