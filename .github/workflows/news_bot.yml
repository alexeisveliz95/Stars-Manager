name: 📰 Koda News Agent (Asíncrono)

on:
  schedule:
    # Se ejecuta cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC)
    # Puedes ajustarlo en https://crontab.guru/
    - cron: '0 */6 * * *'
  
  workflow_dispatch: # Permite que lo ejecutes manualmente desde la pestaña Actions

jobs:
  run-news-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip' # Acelera las ejecuciones guardando las librerías

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run News Orquestador
        env:
          # Configura aquí todas tus API Keys (deben estar en Settings > Secrets)
          STARS_TOKEN: ${{ secrets.STARS_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: python news_orquestador.py

      - name: Save news history
        # Importante: Esto guarda el news_history.json para no repetir noticias
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/news_history.json
          git commit -m "update: actualizar historial de noticias [skip ci]" || echo "No changes to commit"
          git push