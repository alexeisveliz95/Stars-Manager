name: 📰 Stellar News Agent (Asíncrono)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-news-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run News Orquestador
        env:
          STARS_TOKEN: ${{ secrets.STARS_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          # Content channel — posts published here after X
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          # Stellar channel — live log stream
          STELLAR_BOT_TOKEN: ${{ secrets.STELLAR_BOT_TOKEN }}
          STELLAR_CHANNEL_ID: ${{ secrets.STELLAR_CHANNEL_ID }}
        run: python src/agents/news_orquestador.py

      - name: Save news history to Repo
        if: always()
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news_history.json || true
          git add data/history_images/*.png || true
          git add data/*.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "📰 News post archivado: $(date +'%Y-%m-%d %H:%M:%S') [skip ci]" && git push)