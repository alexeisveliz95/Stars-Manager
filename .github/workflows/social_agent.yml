
name: 🤖 AI Social Agent

on:
  schedule:
    - cron: '30 8 * * *'
    - cron: '30 16 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  brain:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install groq tweepy

      - name: Process & Write
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python agents/writer_agent.py
        
      - name: Post to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          # Solo tuitea si el paso anterior generó el archivo tweet_ready.txt
          if [ -f tweet_ready.txt ]; then
            python social/twitter_bot.py
          fi
      
      - name: Upload Tweet Artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-tweet
          path: tweet_ready.txt

      - name: Save History
        run: |
          git config --local user.email "agent@github.com"
          git config --local user.name "AI Social Agent"
          
          # Añadimos todos los cambios en la carpeta data (o donde guardes el historial)
          git add data/*.json || echo "No hay cambios en el historial"
          
          # Solo hacemos commit si hay algo en el 'staging area'
          if ! git diff --cached --quiet; then
            git commit -m "Update tweet history [skip ci]"
            git push
          else
            echo "Nada que actualizar hoy."
          fi