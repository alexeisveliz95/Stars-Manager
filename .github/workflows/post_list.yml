name: 📊 Friday Top List
on:
  schedule:
    - cron: '0 17 * * 5'
  workflow_dispatch:

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 1. GENERAR TEXTO (Basado en el prompt específico para este formato)
      - name: Generate Content
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python src/agents/writer_agent.py "list"

      # 2. GENERAR IMAGEN (Basada en el texto recién creado)
      - name: Generate Image
        if: success()
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python src/agents/image_agent.py "list"

      # 3. PUBLICAR EN X (Con texto e imagen)
      - name: Post to X
        if: success()
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python src/social/twitter_bot.py "tweet_list.txt"

      # 4. SUBIR ARTEFACTO (Para revisión manual en GitHub)
      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-assets
          path: |
            tweet_list.txt
            image_list.png

      # 5. PERSISTIR HISTORIAL EN EL REPO
      # Usamos 'always()' para que si el bot falló, al menos guardemos la imagen generada
      - name: Save History to Repo
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Agregamos el historial de imágenes y cualquier cambio en data/
          git add data/history_images/*.png || true
          git add data/*.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "📸 Archivo de post y assets: $(date +'%Y-%m-%d %H:%M:%S')" && git push)