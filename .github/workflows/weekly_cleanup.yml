name: 🧹 Weekly Repo Cleanup

on:
  schedule:
    # Se ejecuta cada domingo a las 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: 

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Run cleanup script
        run: python scripts/clean_history.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/history_images
          git commit -m "chore: weekly history cleanup [skip ci]" || echo "No changes to commit"
          git push