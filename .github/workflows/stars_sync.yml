name: 🌟 Stars Sync

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run python main.py
      env:
        STARS_TOKEN: ${{ secrets.STARS_TOKEN }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        STELLAR_BOT_TOKEN: ${{ secrets.STELLAR_BOT_TOKEN }}
        STELLAR_CHANNEL_ID: ${{ secrets.STELLAR_CHANNEL_ID }}
      run: python src/main.py

    - name: Commit y Push
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/*.json
        git add DASHBOARD.md || true
        git add Categorias/ || true
        git add Tendencias/ || true
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Sync semanal: repos + reportes actualizados $(date +'%Y-%m-%d')" && git push)