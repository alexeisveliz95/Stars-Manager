name: 🌟 Stars Sync

on:
  schedule:
    # Se ejecuta a las 00:00 todos los lunes
    - cron: '0 0 * * 1'
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña "Actions"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run python main.py
      env:
        STARS_TOKEN: ${{ secrets.STARS_TOKEN }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
      run: python src/main.py
      
    - name: Commit y Push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "Auto-update: Trends and Stars" || exit 0
        git push