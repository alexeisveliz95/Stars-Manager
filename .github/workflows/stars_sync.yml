name: 🌟 Stars Sync

on:
  schedule:
    # Se ejecuta a las 00:00 todos los lunes
    - cron: '0 0 * * 1'
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña "Actions"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run python main.py
      env:
        STARS_TOKEN: ${{ secrets.STARS_TOKEN }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
      run: python src/main.py

    - name: Commit y Push
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/*.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Sync semanal: pool de repos actualizado $(date +'%Y-%m-%d')" && git push)